name: Daily Commodity Summary

on:
  schedule:
    - cron: '0 23 * * 1-5'  # 23:00 UTC, Monday-Friday
  workflow_dispatch:

jobs:
  generate-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright feedparser requests google-auth-oauthlib google-api-python-client
          playwright install chromium
      
      - name: Download Gmail token
        env:
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
        run: |
          echo "$GMAIL_TOKEN" | base64 -d > gmail_token.pickle
      
      - name: Run commodity summary generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JSONBIN_BIN_ID: ${{ secrets.JSONBIN_BIN_ID }}
          JSONBIN_MASTER_KEY: ${{ secrets.JSONBIN_MASTER_KEY }}
        run: python commodity_summary.py
      
      - name: Commit and push results (if any changes)
        if: always()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git diff-index --quiet HEAD || git commit -m "Auto: Commodity summary $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
